name: Add new file to repository

on:
  workflow_dispatch:
    inputs:
        file_contents:
            description: "Enter the contents of the issue template to be updated"
            required: true
            type: string

permissions:
  contents: write
  issues: write

jobs:
    update-issue-template-and-create-issue:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Update issue template markdown file
              run: |
                
                echo "${{ inputs.file_contents }}" >> ./.github/ISSUE_TEMPLATE.md
                echo "File 'ISSUE_TEMPLATE.md' has been updated."
                cat ./.github/ISSUE_TEMPLATE.md

            - name: Commit and push updated issue template
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                commit_message: "Update ISSUE_TEMPLATE.md"
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create an issue using action
              uses: JasonEtco/create-an-issue@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with: 
                filename: ./.github/ISSUE_TEMPLATE.md